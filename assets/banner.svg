<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 240" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">Klazomenai — fair winds and copyleft tides</title>
  <desc id="banner-desc">A nautical horizon banner: deep navy night sky, warm cream stars, an anchor at centre, and gentle waves below the horizon line.</desc>

  <rect width="1280" height="240" fill="#0d1f2d"/>

  <g fill="#e8d8b6" opacity="0.7">
    <circle cx="80"   cy="42" r="0.9"/>
    <circle cx="180"  cy="28" r="1.1"/>
    <circle cx="260"  cy="58" r="0.7"/>
    <circle cx="360"  cy="36" r="1.0"/>
    <circle cx="440"  cy="64" r="0.8"/>
    <circle cx="520"  cy="40" r="1.0"/>
    <circle cx="760"  cy="44" r="1.0"/>
    <circle cx="840"  cy="62" r="0.7"/>
    <circle cx="920"  cy="34" r="1.1"/>
    <circle cx="1020" cy="56" r="0.9"/>
    <circle cx="1100" cy="38" r="1.0"/>
    <circle cx="1200" cy="60" r="0.8"/>
  </g>

  <line x1="0" y1="160" x2="1280" y2="160" stroke="#e8d8b6" stroke-width="0.6" opacity="0.55"/>

  <g transform="translate(640 175)" stroke="#e8d8b6" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="-30" r="6"/>
    <line x1="-14" y1="-18" x2="14" y2="-18"/>
