    <line x1="-24" y1="12" x2="-32" y2="4"/>
    <line x1="24" y1="12" x2="32" y2="4"/>
    <line x1="-32" y1="4" x2="-28" y2="14"/>
    <line x1="32" y1="4" x2="28" y2="14"/>
  </g>

  <g stroke="#e8d8b6" stroke-width="0.5" fill="none" opacity="0.35">
    <path d="M 0 196 Q 80 192 160 196 T 320 196 T 480 196 T 640 196 T 800 196 T 960 196 T 1120 196 T 1280 196"/>
    <path d="M 0 214 Q 80 210 160 214 T 320 214 T 480 214 T 640 214 T 800 214 T 960 214 T 1120 214 T 1280 214"/>
