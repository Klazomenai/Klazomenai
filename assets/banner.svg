  <text x="640" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="7" text-anchor="middle" fill="#e8d8b6" opacity="0.85">FAIR WINDS AND COPYLEFT TIDES</text>
</svg>
